workflows:
  ios-release:
    name: TiliGo iOS → TestFlight (Stable Full Fix)

    instance_type: mac_mini_m1
    max_build_duration: 120

    integrations:
      app_store_connect: tiligo_asc

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:

      # ----------------------------
      # 1. CLEAN WEB BUILD (MANDATORY)
      # ----------------------------
      - name: Install & Build Web
        script: |
          set -e

          npm ci
          npm run build

          echo "Validating build output"
          test -f dist/index.html

      # ----------------------------
      # 2. FULL CAPACITOR RESET (ELIMINATES 90% OF ISSUES)
      # ----------------------------
      - name: Capacitor Clean Sync
        script: |
          set -e

          echo "Removing old iOS platform"
          rm -rf ios

          echo "Recreating iOS platform"
          npx cap add ios

          echo "Sync Capacitor"
          npx cap sync ios

      # ----------------------------
      # 3. POD INSTALL (iOS DEPENDENCIES)
      # ----------------------------
      - name: Install iOS Dependencies
        script: |
          set -e

          cd ios/App
          pod install --repo-update

      # ----------------------------
      # 4. VERIFY XCODE SCHEME (CRITICAL FIX FOR EXIT 65)
      # ----------------------------
      - name: Verify Xcode Scheme
        script: |
          set -e

          cd ios/App
          xcodebuild -list -workspace App.xcworkspace

      # ----------------------------
      # 5. AUTO BUILD NUMBER
      # ----------------------------
      - name: Set Build Number
        script: |
          set -e

          BUILD=$(( $(date +%s) - 1700000000 ))

          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion $BUILD" \
            ios/App/App/Info.plist

      # ----------------------------
      # 6. ARCHIVE (FIXED EXIT 65 SAFE MODE)
      # ----------------------------
      - name: Archive iOS App
        script: |
          set -e

          cd ios/App

          echo "Cleaning previous build state"
          xcodebuild clean -workspace App.xcworkspace -scheme App || true

          echo "Starting archive"
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $CM_BUILD_DIR/build/TiliGo.xcarchive \
            DEVELOPMENT_TEAM=H4QUDPK7S3 \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            clean archive

      # ----------------------------
      # 7. EXPORT IPA (APP STORE READY)
      # ----------------------------
      - name: Export IPA
        script: |
          set -e

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>

            <key>signingStyle</key>
            <string>automatic</string>

            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/TiliGo.xcarchive \
            -exportPath $CM_BUILD_DIR/build \
            -exportOptionsPlist ExportOptions.plist

    artifacts:
      - build/*.ipa
      - build/*.dSYM.zip

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true 