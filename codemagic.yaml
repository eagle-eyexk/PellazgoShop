# codemagic.yaml
workflows:
  ios-workflow:
    name: iOS Build - PellazgoShop
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.pellazgo.app"
        APP_STORE_APPLE_ID: "6782613978"
        APP_STORE_SKU: "PellazgoShop"
        # App Store Connect API (from your pellazgo_asc key)
        APP_STORE_CONNECT_KEY_ID: "3FM3UY4ARQ"
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID  # Set in UI
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY  # Set in UI
      node: 20
      xcode: 15.0
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Copy web build to Capacitor iOS
        script: npx cap copy ios
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          echo "Using provisioning profile: Pellazgo (com.pellazgo.app)"
          xcode-project use-profiles
      - name: Build iOS app (App Store distribution)
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --configuration Release \
            --archive-flags "CODE_SIGN_IDENTITY='Apple Distribution' PROVISIONING_PROFILE_SPECIFIER='Pellazgo'"
      - name: Update App Store metadata (optional)
        script: |
          # This updates the App Store listing with your configured name
          echo "App Name: Pellazgo"
          echo "Subtitle: (your subtitle here)"
          echo "SKU: $APP_STORE_SKU"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_p8: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true
        # Optional: auto-submit for App Store review (use carefully!)
        # submit_to_app_store: false
        beta_groups:
          - "Internal Testers"
      email:
        recipients:
          - elgrandexx@icloud.com
        notify:
          success: true
          failure: true