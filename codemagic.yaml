workflows:
  ios-release:
    name: iOS Release - PellazgoShop
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      groups:
        - code-signing
    triggering:
      events: [push]
      branch_patterns: [{pattern: main}]
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install react react-dom
      
      - name: Build web app
        script: npm run build
      
      - name: Sync Capacitor and pods
        script: |
          npx cap sync ios
          cd ios/App && pod install --repo-update && cd ../..
      
      - name: Set up code signing
        script: |
          # Auto-select the correct provisioning profile
          xcode-project use-profiles
      
      - name: Build and export IPA
        script: |
          cd ios/App
          
          # Auto-increment build number
          BUILD=$(( $(date +%s) - 1700000000 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" App/Info.plist 2>/dev/null || true
          
          # Build archive with explicit team and signing
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -archivePath /Users/builder/build/App.xcarchive \
            DEVELOPMENT_TEAM=H4QUDPK7S3 \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="Pellazgo" \
            archive
          
          test -d /Users/builder/build/App.xcarchive || exit 1
          
          # Export IPA
          cat > /Users/builder/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>H4QUDPK7S3</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.pellazgo.app</key>
                  <string>Pellazgo</string>
              </dict>
          </dict>
          </plist>
          PLIST
          
          xcodebuild -exportArchive \
            -archivePath /Users/builder/build/App.xcarchive \
            -exportPath /Users/builder/build \
            -exportOptionsPlist /Users/builder/ExportOptions.plist
    artifacts:
      - /Users/builder/build/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        issuer_id: 6d7acece-2356-43c3-9946-6fd2cda5bf7d
        key_id: RR98G82857
        submit_to_testflight: true
