name: Pellazgo Shop iOS — Auto Publish

on:
  push:
    branches: ["main"]

jobs:
  build:
    name: Build, Sign & Upload to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          set -e
          npm install
          npm run build

      - name: Setup Capacitor iOS
        run: |
          set -e
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = iPhone Developer;/CODE_SIGN_IDENTITY = "Apple Distribution";/g' ios/App/App.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Photo access'" ios/App/App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Location access'" ios/App/App/Info.plist 2>/dev/null || true
          cd ios/App && pod install --repo-update && cd ../..

      - name: Import signing certificate
        run: |
          set -e
          # Decode P12 from GitHub Secret
          echo "${{ secrets.P12_BASE64 }}" > /tmp/pellazgo.b64
          openssl base64 -d -in /tmp/pellazgo.b64 -out /tmp/pellazgo.p12 2>/dev/null || true
          # If base64 decode fails, try downloading from release
          if [ ! -s /tmp/pellazgo.p12 ]; then
            echo "Base64 decode failed, downloading from release..."
            curl -fsSL -H "Cache-Control: no-cache" \
              -o /tmp/pellazgo.p12 \
              "https://github.com/eagle-eyexk/PellazgoShop/releases/download/signing-v1/pellazgo.p12?t=$(date +%s)"
          fi
          ls -la /tmp/pellazgo.p12
          # If file is empty or too small, fail
          [ -s /tmp/pellazgo.p12 ] || { echo "P12 file is empty"; exit 1; }
          # Install
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp signing/*.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          security create-keychain -p build123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p build123 build.keychain
          for pass in "PellazgoShop" "Pellazgo2026" "Pellazgo2026!" "dwvSVdum"; do
            security import /tmp/pellazgo.p12 -k build.keychain -P "$pass" -T /usr/bin/codesign 2>/dev/null && { echo "PASSWORD: $pass"; break; }
          done
          security set-key-partition-list -S apple-tool:,apple: -s -k build123 build.keychain
          security find-identity -v -p codesigning build.keychain | grep -q "Apple Distribution" || { echo "No distribution identity found"; exit 1; }
          echo "SIGNING READY"

      - name: Set build number
        run: |
          BUILD=$(( $(date +%s) - 1700000000 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" ios/App/App/Info.plist

      - name: Archive
        run: |
          set -e
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/PellazgoShop.xcarchive \
            DEVELOPMENT_TEAM=H4QUDPK7S3 \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="Pellazgo Shop" \
            archive 2>&1 | tail -20
          test -d build/PellazgoShop.xcarchive && echo "ARCHIVE SUCCEEDED"

      - name: Export IPA
        run: |
          set -e
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>H4QUDPK7S3</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.pellazgo.app</key><string>Pellazgo Shop</string>
            </dict>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/PellazgoShop.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist 2>&1 | tail -10
          ls -la build/*.ipa && echo "EXPORT SUCCEEDED"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PellazgoShop.ipa
          path: build/*.ipa
