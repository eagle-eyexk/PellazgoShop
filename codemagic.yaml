workflows:
  ios-release:
    name: Pellazgo Shop iOS → TestFlight
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: pellazgo_asc
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - code-signing
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          set -e
          npm install
          npm run build
      - name: Generate iOS project
        script: |
          set -e
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          find ios -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' {} \;
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'This app needs access to your photo library.'" ios/App/App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'This app needs your location to show nearby shops.'" ios/App/App/Info.plist 2>/dev/null || true
          cd ios/App && pod install --repo-update && cd ../..
      - name: Install signing
        script: |
          set -e
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp signing/*.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          security create-keychain -p build123 build.keychain 2>/dev/null || true
          security default-keychain -s build.keychain
          security unlock-keychain -p build123 build.keychain
          for p12 in signing/*.p12; do
            security import "$p12" -k build.keychain -P "Pellazgo" -T /usr/bin/codesign
          done
          security set-key-partition-list -S apple-tool:,apple: -s -k build123 build.keychain
      - name: Set build number
        script: |
          BUILD=$(( $(date +%s) - 1700000000 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" ios/App/App/Info.plist 2>/dev/null || true
      - name: Archive
        script: |
          set -e
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath /Users/builder/build/PellazgoShop.xcarchive DEVELOPMENT_TEAM=H4QUDPK7S3 CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER="Pellazgo Shop" archive
          test -d /Users/builder/build/PellazgoShop.xcarchive
      - name: Export IPA
        script: |
          set -e
          cat > /Users/builder/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>H4QUDPK7S3</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.pellazgo.app</key><string>Pellazgo Shop</string>
            </dict>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive -archivePath /Users/builder/build/PellazgoShop.xcarchive -exportPath /Users/builder/build -exportOptionsPlist /Users/builder/ExportOptions.plist
    artifacts:
      - /Users/builder/build/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
