workflows:
  ios-release:
    name: Pellazgo Shop iOS → TestFlight
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: pellazgo_asc
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          set -e
          npm install
          npm run build
      - name: Sync Capacitor iOS
        script: |
          set -e
          npx cap sync ios
          cd ios/App && pod install --repo-update && cd ../..
      - name: Set build number
        script: |
          BUILD=$(( $(date +%s) - 1700000000 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" ios/App/App/Info.plist 2>/dev/null || true
      - name: Archive
        script: |
          set -e
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath /Users/builder/build/PellazgoShop.xcarchive \
            DEVELOPMENT_TEAM=H4QUDPK7S3 \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            archive
      - name: Export IPA
        script: |
          set -e
          cat > /Users/builder/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath /Users/builder/build/PellazgoShop.xcarchive \
            -exportPath /Users/builder/build \
            -exportOptionsPlist /Users/builder/ExportOptions.plist
    artifacts:
      - /Users/builder/build/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true