# codemagic.yaml
workflows:
  ios-workflow:
    name: iOS Build - PellazgoShop
    max_build_duration: 60
    
    environment:
      node: 20
      xcode: 15.0
      cocoapods: default
      vars:
        APP_STORE_CONNECT_KEY_ID: "3FM3UY4ARQ"
        # These variables are set in Codemagic UI Environment Variables
        # APP_STORE_CONNECT_ISSUER_ID: [SET IN UI]
        # APP_STORE_CONNECT_PRIVATE_KEY: [SET IN UI]
        BUNDLE_ID: "com.pellazgo.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        TESTFLIGHT_GROUP: "Internal Testers"
    
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Copy to Capacitor
        script: npx cap copy ios
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Auto-configure signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      app_store_connect:
        api_key_id: "$APP_STORE_CONNECT_KEY_ID"
        issuer_id: "$APP_STORE_CONNECT_ISSUER_ID"
        key_p8: "$APP_STORE_CONNECT_PRIVATE_KEY"
        submit_to_testflight: true
        beta_groups:
          - "$TESTFLIGHT_GROUP"
      email:
        recipients:
          - elgrandexx@icloud.com
        notify:
          success: true
          failure: true