# codemagic.yaml
workflows:
  ios-workflow:
    name: iOS Build - PellazgoShop
    max_build_duration: 60
    
    environment:
      node: 20
      xcode: 15.0
      cocoapods: default
      
      # Your App Store Connect API Key (3FM3UY4ARQ)
      # These variables are set in Codemagic UI
      vars:
        APP_STORE_CONNECT_KEY_ID: "3FM3UY4ARQ"
        # APP_STORE_CONNECT_ISSUER_ID: [SET IN UI]
        # APP_STORE_CONNECT_PRIVATE_KEY: [SET IN UI]
        BUNDLE_ID: "com.pellazgo.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        TESTFLIGHT_GROUP: "Internal Testers"
    
    scripts:
      # 1. Install dependencies
      - name: Install npm dependencies
        script: npm install
      
      # 2. Build web app with Vite
      - name: Build web app
        script: npm run build
      
      # 3. Copy to Capacitor iOS
      - name: Copy build to Capacitor
        script: npx cap copy ios
      
      # 4. Sync Capacitor iOS project
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      
      # 5. Auto-configure code signing (uses uploaded certificate & profile)
      - name: Auto-configure code signing
        script: xcode-project use-profiles
      
      # 6. Build iOS IPA
      - name: Build IPA for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSAPCE" \
            --scheme "$XCODE_SCHEME"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      # Auto-submit to TestFlight using your API key (3FM3UY4ARQ)
      app_store_connect:
        api_key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_p8: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true
        beta_groups:
          - $TESTFLIGHT_GROUP
      
      # Send email notifications
      email:
        recipients:
          - elgrandexx@icloud.com
        notify:
          success: true
          failure: true